<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRelay AI - SPECTRUM 2026 Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            color: #000000;
        }

        /* Strictly Black Text */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-gray-100 font-sans text-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function EcoRelayApp() {
            const [view, setView] = useState('dashboard');
            const [isBroadcasting, setIsBroadcasting] = useState(false);
            const [broadcastSuccess, setBroadcastSuccess] = useState(false);

            const triggerN8n = () => {
                setIsBroadcasting(true);
                // Simulating n8n Webhook / Python API latency
                setTimeout(() => {
                    setIsBroadcasting(false);
                    setBroadcastSuccess(true);
                    setTimeout(() => setBroadcastSuccess(false), 4000);
                }, 1500);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative overflow-hidden flex flex-col">
                    {/* Header: Professional Branding */}
                    <header className="p-6 bg-white border-b border-gray-200 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black tracking-tighter text-black">EcoRelay AI</h1>
                            <p className="text-xs font-semibold text-gray-500 uppercase">IEM Sector V Canteen</p>
                        </div>
                        <div className="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold">
                            FH
                        </div>
                    </header>

                    <main className="flex-1 p-6 space-y-6 overflow-y-auto">
                        {/* SkyDeck AI Section: Predictive Analytics */}
                        <section className="bg-blue-50 border-2 border-blue-200 p-5 rounded-3xl">
                            <div className="flex items-center space-x-2 mb-2">
                                <span className="text-xl">✨</span>
                                <h2 className="font-bold text-black uppercase text-xs tracking-widest">SkyDeck AI Prediction</h2>
                            </div>
                            <h3 className="text-xl font-extrabold text-black leading-tight">High Surplus Detected</h3>
                            <p className="text-sm text-black mt-2 leading-relaxed">
                                Analysis of biometric attendance and historical logs suggests <strong>45+ meals</strong> will be available by 8:00 PM.
                            </p>
                        </section>

                        {/* Broadcast Module */}
                        <section className="space-y-4">
                            <h3 className="text-lg font-bold text-black">Broadcast Redistribution</h3>
                            <div className="space-y-3">
                                <div className="p-4 bg-gray-50 rounded-2xl border border-gray-200">
                                    <label className="text-xs font-bold text-gray-500 uppercase">Estimated Quantity</label>
                                    <input type="number" defaultValue="45" className="w-full bg-transparent text-lg font-bold outline-none text-black" />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="p-4 bg-gray-50 rounded-2xl border border-gray-200">
                                        <label className="text-xs font-bold text-gray-500 uppercase">Food Type</label>
                                        <p className="font-bold text-black">Veg & Non-Veg</p>
                                    </div>
                                    <div className="p-4 bg-gray-50 rounded-2xl border border-gray-200">
                                        <label className="text-xs font-bold text-gray-500 uppercase">Pickup By</label>
                                        <p className="font-bold text-black">20:30 PM</p>
                                    </div>
                                </div>
                            </div>

                            <button
                                onClick={triggerN8n}
                                disabled={isBroadcasting}
                                className={`w-full py-5 rounded-3xl font-black text-lg transition-all shadow-lg active:scale-95 ${isBroadcasting ? 'bg-gray-400' : 'bg-black text-white hover:bg-gray-800'}`}
                            >
                                {isBroadcasting ? 'BROADCASTING...' : 'NOTIFY LOCAL NGOs 🚀'}
                            </button>
                        </section>

                        {/* Recent Impact / Logs from MongoDB */}
                        <section className="pt-4">
                            <h3 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Recent Activity</h3>
                            <div className="space-y-3">
                                <div className="flex items-center space-x-4 p-4 border border-gray-100 rounded-2xl">
                                    <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                                    <div>
                                        <p className="text-sm font-bold text-black">Robin Hood Army Picked Up</p>
                                        <p className="text-xs text-gray-500">Yesterday • 32 Meals redistributed</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* Navigation Footer */}
                    <nav className="p-4 border-t border-gray-100 flex justify-around items-center bg-white">
                        <span className="text-2xl opacity-100 cursor-pointer">🏠</span>
                        <span className="text-2xl opacity-30 cursor-pointer">📊</span>
                        <span className="text-2xl opacity-30 cursor-pointer">🚚</span>
                        <span className="text-2xl opacity-30 cursor-pointer">⚙️</span>
                    </nav>

                    {/* n8n Success Toast */}
                    {broadcastSuccess && (
                        <div className="absolute bottom-24 left-6 right-6 bg-black text-white p-4 rounded-2xl shadow-2xl text-center animate-bounce">
                            <p className="font-bold text-sm">✅ n8n Webhook Triggered!</p>
                            <p className="text-xs opacity-80">WhatsApp Alerts sent to 5 nearby NGOs.</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EcoRelayApp />);
    </script>
</body>

</html>
